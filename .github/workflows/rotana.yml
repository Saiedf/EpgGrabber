name: Generate Rotana EPG

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install cloudscraper beautifulsoup4

      - run: python generate_rotana.py

      - run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add Files/rotana.xml
          git commit -m "Update rotana.xml" || echo "No changes"
          git push
